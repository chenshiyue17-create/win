<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>门窗知识库训练台</title>
    <link rel="icon" href="/static/assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/kb_trainer.css" />
  </head>
  <body>
    <main class="trainer-shell">
      <header class="trainer-header">
        <div class="brand">
          <img src="/static/assets/favicon.svg" width="32" height="32" />
          <div>
            <h1>门窗知识库训练台</h1>
            <p>本地知识投喂、审核、备份与检索</p>
          </div>
        </div>
        <nav class="main-nav">
          <div class="tabs">
            <button class="tab-btn active" data-tab="learning">待审核 (学习队列)</button>
            <button class="tab-btn" data-tab="kb">活跃库 (知识编辑)</button>
            <button class="tab-btn" data-tab="tools">维护 (备份/导入)</button>
          </div>
          <div class="external-links">
            <a href="/overlay" target="_blank" class="secondary">打开悬浮窗 ↗</a>
          </div>
        </nav>
      </header>

      <!-- 1. 学习队列页面 (核心工作流) -->
      <section id="tab-learning" class="tab-content active">
        <div class="trainer-grid-two">
          <aside class="queue-list">
            <div class="section-head">
              <h2>待审核候选</h2>
              <span id="learningStatus">读取中</span>
            </div>
            <div id="learningList" class="results scrollable"></div>
          </aside>
          
          <section class="review-focus">
            <div id="reviewPlaceholder" class="placeholder-msg">请从左侧选择一条“候选知识点”进行审核</div>
            <div id="reviewEditor" class="editor hidden">
                <div class="section-head">
                  <h2>AI 建议详情</h2>
                  <div class="action-row">
                    <button id="rejectBtn" class="danger">拒绝</button>
                    <button id="approveBtn" class="success">采纳进库</button>
                  </div>
                </div>
                <div class="source-bubble">
                  <strong>用户原文：</strong>
                  <p id="sourceText"></p>
                  <small id="learningReason"></small>
                </div>
                <div class="form-grid">
                  <label>标题<input id="revTitle" /></label>
                  <label class="wide">标签 (逗号分隔)<input id="revTags" /></label>
                  <label class="wide">知识内容<textarea id="revContent"></textarea></label>
                  <label class="wide">回复话术建议<textarea id="revReply"></textarea></label>
                </div>
            </div>
          </section>
        </div>
      </section>

      <!-- 2. 活跃知识库编辑 -->
      <section id="tab-kb" class="tab-content">
        <div class="trainer-grid">
          <aside class="entry-list scrollable">
            <div class="section-head">
              <h2>所有条目</h2>
              <span id="entryCount">0 条</span>
            </div>
            <div id="entryList"></div>
          </aside>
          <section class="editor">
            <div class="section-head">
              <h2>知识编辑</h2>
              <span id="saveStatus">就绪</span>
            </div>
            <div class="form-grid">
              <label>条目 ID<input id="entryId" readonly/></label>
              <label>标题<input id="entryTitle" /></label>
              <label class="wide">标签<input id="entryTags" /></label>
              <label class="wide">知识内容<textarea id="entryContent"></textarea></label>
              <label class="wide">回复模板<textarea id="entryReply"></textarea></label>
            </div>
            <div class="action-row">
              <button id="newBtn">新建</button>
              <button id="saveBtn" class="success">保存更改</button>
            </div>
          </section>
          <aside class="tester">
            <div class="section-head"><h2>检索测试</h2></div>
            <textarea id="testQuery" placeholder="输入客户问题测试命中情况..."></textarea>
            <button id="testBtn">测试 RAG 命中</button>
            <div id="testResults" class="results"></div>
          </aside>
        </div>
      </section>

      <!-- 3. 系统工具 -->
      <section id="tab-tools" class="tab-content">
        <div class="tools-grid">
            <div class="tool-card">
                <h3>数据备份</h3>
                <p id="kbStatus">正在检查本地存储...</p>
                <div class="action-row">
                    <button id="backupBtn">本地备份</button>
                    <button id="githubBackupBtn">GitHub 归档</button>
                </div>
                <p id="githubStatus" class="status-text"></p>
            </div>
            <div class="tool-card">
                <h3>批量操作</h3>
                <textarea id="importJson" placeholder="粘贴 JSON 数据进行导入..."></textarea>
                <div class="action-row">
                    <button id="importBtn">导入训练集</button>
                    <button id="exportBtn" class="secondary">导出完整库</button>
                </div>
            </div>
            <div class="tool-card">
                <h3>采集与蒸馏</h3>
                <div class="url-harvest-box">
                    <input id="harvestUrl" placeholder="粘贴分享链接 (如小红书)..." />
                    <button id="harvestBtn">一键采集评论</button>
                </div>
                <p id="interactionStatus">统计中...</p>
                <button id="exportDistillBtn">导出对话蒸馏数据</button>
                <div id="interactionList" class="compact-list scrollable"></div>
            </div>
        </div>
      </section>

    </main>
    <script src="/static/kb_trainer.js"></script>
  </body>
</html>
