app:
  name: "门窗识图顾问工具"
  host: "127.0.0.1"
  port: 8787
  log_file: "logs/app.log"

knowledge_base:
  source_file: "data/knowledge_base.json"
  seed_file: "tasks/knowledge_base.seed.json"
  backup_dir: "data/kb_backups"
  min_entries: 1
  max_results: 8
  min_score: 1

recognition:
  max_upload_mb: 12
  allowed_image_types:
    - "image/png"
    - "image/jpeg"
    - "image/webp"
  ocr_language: "chi_sim+eng"

assistant:
  confidence_floor: 0.18
  safety_stop_words:
    - "绝对隔音"
    - "永久不漏水"
    - "保证自爆"
    - "验证码"
    - "身份证"
